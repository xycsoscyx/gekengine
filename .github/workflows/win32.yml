name: win32

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      os: windows-latest

  test:
    runs-on: windows-latest
    needs: build
    steps:
      - name: Test
        working-directory: ${{github.workspace}}/build
        run: ctest -C ${{env.BUILD_TYPE}}
