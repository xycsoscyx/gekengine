name: build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      os_matrix: ${{ steps.set-list.outputs.os_list }}
    steps:
      - id: set-list
        # The list is defined ONCE here as a JSON string
        run: echo 'os_list=["ubuntu-latest", "windows-latest"]' >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.setup.outputs.os_matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
      - name: Clone Slang
        run: git clone --depth 1 --branch v2026.2.2 https://github.com/shader-slang/slang.git ${{github.workspace}}/slang
      - name: Build and install Slang
        run: |
          cmake -S ${{github.workspace}}/slang -B ${{github.workspace}}/slang/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DSLANG_ENABLE_TESTS=OFF -DSLANG_ENABLE_EXAMPLES=OFF -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/slang/install
          cmake --build ${{github.workspace}}/slang/build --config ${{env.BUILD_TYPE}} --target install
    - name: Prepare Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2.1
      with:
        vulkan-query-version: 1.4.304.1
        vulkan-components: Vulkan-Headers, Vulkan-Loader
        vulkan-use-cache: true
    - name: Print Vulkan SDK env (Windows only)
      if: runner.os == 'Windows'
      run: |
        echo "VULKAN_SDK=$Env:VULKAN_SDK"
        echo "VULKAN_SDK=$Env:VULKAN_SDK" | Out-File -FilePath $env:GITHUB_ENV -Append
        echo "Vulkan_INCLUDE_DIR=$Env:VULKAN_SDK\Include" | Out-File -FilePath $env:GITHUB_ENV -Append
        echo "Vulkan_LIBRARY=$Env:VULKAN_SDK\Lib" | Out-File -FilePath $env:GITHUB_ENV -Append
    - name: Print Vulkan SDK env (Linux only)
      if: runner.os == 'Linux'
      run: |
        echo "VULKAN_SDK=$VULKAN_SDK"
        echo "VULKAN_SDK=$VULKAN_SDK" >> $GITHUB_ENV
        echo "Vulkan_INCLUDE_DIR=$VULKAN_SDK/include" >> $GITHUB_ENV
        echo "Vulkan_LIBRARY=$VULKAN_SDK/lib" >> $GITHUB_ENV
      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DVULKAN_SDK="${{ env.VULKAN_SDK }}" -DVulkan_INCLUDE_DIR="${{ env.Vulkan_INCLUDE_DIR }}" -DVulkan_LIBRARY="${{ env.Vulkan_LIBRARY }}" -DSLANG_ROOT=${{github.workspace}}/slang/install
    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}
